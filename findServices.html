<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Services - Campus Connect</title>
  <link rel="stylesheet" href="findServices.css">
  

 
</head>
<body>
  <header>
    <div class="logo">
      <h1><i>Campus Connect</i></h1>
    </div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="#">About</a>
      <a href="#">How It Works</a>
      <a href="#">Contact</a>
       
    </nav>
  </header>

  <section class="services">
    <h2>Find Student Services</h2>
    <p>Search and explore services offered by students on campus</p>

    
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search for a service..." onkeyup="filterServices()">
    </div>

    
    <div class="services-grid" id="servicesGrid">
      <div class="service">
        <img src="business1.jpeg" alt="Bedding">
        <h3>Bedding</h3>
      </div>
      <div class="service">
        <img src="bags.jpeg" alt="Bags">
        <h3>Bags</h3>
      </div>
      <div class="service">
        <img src="Nails.jpeg" alt="Nails">
        <h3>Nails</h3>
      </div>
      <div class="service">
        <img src="Tutoring.png" alt="Tutoring">
        <h3>Tutoring</h3>
      </div>
      <div class="service">
        <img src="Photography.png" alt="Photography">
        <h3>Photography</h3>
      </div>
      <div class="service">
        <img src="cleaning.png" alt="Cleaning Services">
        <h3>Graphic Design</h3>

      </div>
    </div>
  </section>

  <script src="findServices.js"></script>

</body>
</html>
